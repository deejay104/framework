<!-- BEGIN: corps -->

<div class="row">

  <!-- ── Colonne principale : fil d'actualités ── -->
  <div class="col-md-8 grid-margin stretch-card">
    <div class="card">
      <div class="card-header" style="padding:14px 20px;">
        <span style="font-size:1rem; font-weight:600; color:#2d3748;">
          <i class="mdi mdi-bulletin-board" style="color:#4a6fa5; margin-right:6px;"></i>Actualités
        </span>
      </div>
      <div class="card-body" style="padding:20px;">

        <!-- Zone de rédaction -->
        <div id="actualitesNouveau">
          <form name="actualites" method="post" action="{path_root}/actualites" enctype="multipart/form-data">
			<INPUT type="hidden" id="id" name="id" value="{id}">

            <div class="compose-box">
              <div id="myavatar" class="feed-avatar"></div>
              <div class="compose-form">
                <input type="text" class="form-control form-input" name="form_titre" placeholder="Titre de l'actualité…" style="margin-bottom:8px;" value="{news_title}">
                <textarea name="form_message" class="form-control form-input" placeholder="Quoi de neuf ?" rows="2">{news_message}</textarea>
                <div class="compose-toolbar">
                  <label for="file" class="btn-photo">
                    <i class="mdi mdi-camera"></i> Photo
                  </label>
                  <input id="file" type="file" style="display:none">
                  <input name="fonc" class="btn btn-primary btn-sm" type="submit" value="{lang_post}" style="margin-left:auto; border-radius:6px;">
                </div>
				<div id="uploadDoc" class="upload">
					<div id="uploadProgress" style="display:none; text-align:center; font-size:0.82rem; color:#718096;"></div>
				</div>
              </div>
            </div>

          </form>
        </div>

        <!-- Fil d'actualités (injecté par JS) -->
        <div id="news" class="profile-feed m-top-15"></div>

      </div>
    </div>
  </div>

  <!-- ── Colonne droite : informations ── -->
  <div class="col-md-4 grid-margin stretch-card">
    <div class="card">
      <div class="card-body" style="padding:20px;">

        <!-- Recherche actualités -->
        <div id="card-search" class="sidebar-section">
          <div class="sidebar-section-title">
            <i class="mdi mdi-magnify"></i> {lang_search}
          </div>
          <form name="recherche" method="post" action="{path_root}/index.php" enctype="multipart/form-data">
            <input type="hidden" name="mod" value="actualites">
            <input id="searchactu" class="form-control form-control-sm" type="text" name="search" placeholder="{lang_searchterms}" onkeyup="CapturePost(event);">
          </form>
        </div>

        <!-- Derniers documents -->

        <div id="card-document" class="sidebar-section sidebar-list-item">
			<div class="sidebar-section-title">
				<i class="mdi mdi-file-document"></i> {lang_lastdocs}
			</div>
			<!-- BEGIN: lst_lastdocs -->
			{form_document_link}
			<!-- END: lst_lastdocs -->
        </div>


        <!-- Échéances pilote -->
        <div id="card-echeance" class="sidebar-section">
			<div class="sidebar-section-title">
				<i class="mdi mdi-shield-check"></i> {lang_information}
			</div>
			<!-- BEGIN: lst_echeance -->
			{form_echeance}
			<!-- END: lst_echeance -->
		</div>

		<div id="card-custom">
			{aff_custom}
		</div>

      </div>
    </div>
  </div>

</div>


<script type="text/javascript">
	var lastid=0;
	var aff=0;
	var searchTxt="";

	loadNews(0,2,"",0,1);
	loadNews(0,8,"",{idstart},0);

  	var aff_avatar=getAvatar("{form_avatar}","{form_displayname}");
  	$("#myavatar").html(aff_avatar);


	// preventing page from redirecting
	$("html").on("dragover", function(e) {
		e.preventDefault();
		e.stopPropagation();
		$("h1").text("Drag here");
	});

	$("html").on("drop", function(e) { e.preventDefault(); e.stopPropagation(); });



    // preventing page from redirecting
    $("html").on("dragover", function(e) {
        e.preventDefault();
        e.stopPropagation();
        <!-- $("h1").text("Drag here"); -->
    });

    $("html").on("drop", function(e) { e.preventDefault(); e.stopPropagation(); });

    // Drag enter
    $('#actualitesNouveau').on('dragenter', function (e) {
        e.stopPropagation();
        e.preventDefault();
        $("#actualitesNouveau").css({"border":"1px dashed #000000"});
    });

    // Drag over
    $('#actualitesNouveau').on('dragover', function (e) {
        e.stopPropagation();
        e.preventDefault();
        $("#actualitesNouveau").css({"border":"1px dashed #000000"});
    });

    // Drag leave
    $('#actualitesNouveau').on('dragleave', function (e) {
        $("#actualitesNouveau").css({"border":"0px"});
    });

    // Drop
    $('#actualitesNouveau').on('drop', function (e) {
	console.log("drop");
        e.stopPropagation();
        e.preventDefault();

        $("#actualitesNouveau").css({"border":"0px"});

        var file = e.originalEvent.dataTransfer.files;
        var fd = new FormData();

        fd.append('file', file[0]);

        uploadData(fd);
    });

    // Open file selector on div click
    $("#uploadfile").click(function(){
		console.log("click");
        $("#file").click();
    });

    // file selected
    $("#file").change(function(){
        var fd = new FormData();

        var files = $('#file')[0].files[0];

        fd.append('file',files);

        uploadData(fd);
    });


	// Sending AJAX request and upload file
	function uploadData(formdata){
		$("#uploadProgress").css({"display":"block"});
		$("#uploadProgress").text("Chargement du document en cours");

		$.ajax({
			url: '{apiurlpost}&type=file&id='+document.getElementById("id").value,
			type: 'post',
			data: formdata,
			contentType: false,
			processData: false,
			dataType: 'json',
			success: function(response){
				addThumbnail(response);
				$("#uploadProgress").css({"display":"none"});
			},
			error: function(response){
				$("#uploadProgress").css({"display":"none"});
			}
		});
	}

	// Added thumbnail
	function addThumbnail(data){

		var len = $("#actualitesNouveau div.thumbnail").length;

		var num = Number(len);
		num = num + 1;
		
		if (data.status=="ok")
		{
			if (data.type=="image")
			{
				$("#uploadDoc").append('<div id="thumbnail_'+num+'" class="thumbnail"></div>');
			}
			else
			{
				$("#uploadDoc").append('<div id="thumbnail_'+num+'"></div>');
			}
			$("#thumbnail_"+num).append(data.link);
			document.getElementById("id").value=data.id;
			console.log(data.id);
		}
		else
		{
			$("#actualitesNouveau").append('<div>Erreur avec le chargement du fichier !</div>');
		}
	}

	// Bytes conversion
	function convertSize(size) {
		var sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
		if (size == 0) return '0 Byte';
		var i = parseInt(Math.floor(Math.log(size) / Math.log(1024)));
		return Math.round(size / Math.pow(1024, i), 2) + ' ' + sizes[i];
	}

	$(function() {
			// auto adjust the height of
			$('#actualitesNouveau').delegate( 'textarea', 'keydown', function (){
			    $(this).height( 0 );
			    $(this).height( this.scrollHeight );
			});
			$('#actualitesNouveau').find( 'textarea' ).keydown();

	});



	function loadNews(id,limit,search,mid=0,fav=0)
	{
		console.log("load:"+id+"-"+limit);
		console.log("lastid:"+lastid);

		$.ajax({
			type: 'GET',
			url: '{apiurlget}&id='+id+'&mid='+mid+'&fav='+fav+'&limit='+limit+'&search='+search,
			dataType: 'JSON',

			success: function(response) {

				var txt="";
				if (response.news.length>0)
				{
					$.each(response.news, function (index, value) {

						var isPinned = value.favori > 0;
           				var aff_avatar=getAvatar(value.avatar,value.displayname);

						txt = '<div id="news_'+value.id+'" class="feed-item'+(isPinned ? ' pinned' : '')+'">';
						txt += '<div class="feed-avatar">'+aff_avatar+'</div>';
						txt += '<div class="feed-body">';

						// Titre + actions
						txt += '<div class="feed-title">';
						if (isPinned) {
							txt += '<span class="pin-badge"><i class="mdi mdi-star" style="font-size:.7rem;"></i> Rappel</span>';
						}
						txt += '<span>'+value.title+'</span>';

						// Boutons d'action (visibles au hover via CSS)
						txt += '<span class="feed-actions" id="edit_'+value.id+'">';
						if (value.setfav=="yes") {
							if (isPinned) {
								txt += "<a href='#' onclick='setFav("+value.id+",0);' title='Désépingler'><i class='mdi mdi-star'></i></a>";
							} else {
								txt += "<a href='#' onclick='setFav("+value.id+",1);' title='Épingler'><i class='mdi mdi-star-outline'></i></a>";
							}
						}
						if (value.edit=="ok")   txt += "<a href='#' onclick='editNews("+value.id+");' title='Modifier'><i class='mdi mdi-pencil'></i></a>";
						if (value.delete=="ok") txt += "<a href='' onclick='delNews("+value.id+");' title='Supprimer'><i class='mdi mdi-delete'></i></a>";
						txt += '</span>';
						txt += '</div>'; // .feed-title

						// Méta
						txt += '<div class="feed-meta">'+value.author+'<span class="sep">·</span><i class="mdi mdi-clock-outline" style="font-size:.8rem;"></i>'+value.date+'</div>';

						// Contenu
						txt += '<p class="feed-text">'+value.message+'</p>';
						txt += '</div></div>';

						if (isPinned) {
							$("#news").prepend(txt);
						} else {
							$("#news").append(txt);
						}
						lastid = value.id;
					});
				}
				aff=0;
			},
			error: function(response) {
				console.log("error");
				console.log(response);
			}
		});
	}

	function delNews(id)
	{
		var is_confirmed = confirm("Souhaitez-vous supprimer cette actualité ?");
		if (is_confirmed) { 
			
			$.ajax({
				type: 'GET',
				url: '{apiurldel}&id='+id,
				dataType: 'JSON',

				success: function(response) {
					document.getElementById('news_'+id).style.display='none';
				}
			});
		}
		return false;
	}
	function editNews(id)
	{
		window.location.replace("/?id="+id);
	}
	function setFav(id,fav)
	{
		window.location.replace("/?favid="+id+"&setfav="+fav);
	}

	$(window).scroll(function() {
		if($(window).scrollTop() + $(window).height() >= $(document).height()-50) {
			if (aff==0)
			{
				aff=1;
				loadNews(lastid,2,searchTxt,0);
			}
		}
	});
	

	function ClearText(e,txt) {
	
		if(window.event)
	          {
	          	//IE
	          	var t = window.event.srcElement;
	          } 
		else
	          { //firefox
	          	var t = e.target;
	          } 

		if (t.value==txt)
		  { t.value=''; t.style.color="#000000"; }
		return;
	}

	var timer=null;
	function CapturePost(e) {
		text="";
	
		if(window.event)
	          { key = window.event.keyCode;	} //IE
		else
	          { key = e.which;  } //firefox
	
		if (key==13)
		 { 
			return false;
	 	 }

		if (timer) {
			window.clearTimeout(timer);
		}
		timer = window.setTimeout( function() {
			timer = null;
			$("#news").text("");
			loadNews(0,4,$("#searchactu").val());
			console.log($("#searchactu").val());
		}, 400 );
	}


	
</script>

<!-- END: corps -->

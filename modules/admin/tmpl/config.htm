<script type="text/javascript">
	$(function() {
    $(document).tooltip({
      position: {
        my: "left top",
        at: "left+5 top+25",
        using: function( position, feedback ) {
          $( this ).css( position );
          $( "<div>" )
            .addClass( "settings" )
            .addClass( feedback.vertical )
            .addClass( feedback.horizontal )
            .appendTo( this );
        }
      }
    });
  });
</script>


<form name="form_detail" method="post" action="{path_root}/admin/config" enctype="multipart/form-data">


<div class='row'>
  <div class='card'>
      <div class='card-header'><input type="submit" class="btn btn-primary mr-2" name="fonc" id="enregistrer" value="{lang_save}"></div>
      <div class='card-body'>

        <table class="table table-hover datatable">
          <tr class="t-header">
            <th>{lang_parameter}</th>
            <th>{lang_variable}</th>
            <th>{lang_value}</th>
            <th>{lang_default}</th>
          </div>

          <!-- BEGIN: lst_param -->
          <tr>
            <td>{param_nom}</td>
            <td>{param_var}</td>
            <td><input class="form-control" name="MyOptTab[{param_var1}][{param_var2}]" value="{param_txt}"  title="{param_help}" style="width:300px;"/></td>
            <td>{param_default}</td>
          </tr>
          <!-- END: lst_param -->
        </table>
      </div>

      <div class='card-footer'><input type="submit" class="btn btn-primary mr-2" name="fonc" id="enregistrer" value="{lang_save}"></div>
  </div>
</div>

</form>

<SCRIPT language="javascript">
    function checkPasswordStrength() {
      var pwd = document.getElementById('new_password').value;
      var score = 0;
      if (pwd.length >= 8)        score++;
      if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
      if (/\d/.test(pwd))         score++;
      if (/[^a-zA-Z0-9]/.test(pwd)) score++;

      document.getElementById('pwd-strength').setAttribute('data-score', score);

      var hints = ['Très faible', 'Faible', 'Moyen', 'Bon', 'Excellent'];
      document.getElementById('pwd-hint').textContent = pwd.length > 0 ? hints[score] : 'Min. 8 caractères, majuscule, minuscule, chiffre';
    }

	function cryptData()
	{
   		var str0 = document.getElementById('old_password').value;
		var str1 = document.getElementById('new_password').value;
		var str2 = document.getElementById('confirm_password').value;

		if ((str1=="") || (str2==""))
		{
			showToast("Erreur","Le mot de passe ne doit pas être vide","error");
			return false;
		}

		if ((str1==str2))
		{
			if (str1=="")
			{
				document.getElementById('form_newmdp').value = "**NONE**";
				showToast("Erreur","Le mot de passe ne doit pas être vide","error");
				return false;
			}
			else
			{
			  	document.getElementById('form_oldmdp').value = MD5(str0);
			  	document.getElementById('form_newmdp').value = MD5(str1);
			}

			document.getElementById('old_password').value = "";
			document.getElementById('new_password').value = "";
			document.getElementById('confirm_password').value = "";

			document.form_detail.submit();
		}
		else
		{
			showToast("Erreur","Les mots de passe ne correspondent pas.","error");

		  	return false;
		}
	}

</SCRIPT>

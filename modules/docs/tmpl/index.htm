<style>
    /* ════════════════════════════════════════
       NOUVEAUX STYLES — page Documents
       ════════════════════════════════════════ */

    /* En-tête */
    .docs-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .docs-title {
      font-size:20px; font-weight:700; color:#1a2540;
      display:flex; align-items:center; gap:10px;
    }
    .docs-title i { color:var(--primary); font-size:22px; }

    .btn-new-folder {
      display:inline-flex; align-items:center; gap:7px;
      background:var(--primary); color:#fff; border:none; border-radius:10px;
      padding:9px 18px; font-size:13.5px; font-weight:600; cursor:pointer;
      transition:background .18s, box-shadow .18s, transform .12s;
      box-shadow:0 3px 10px rgba(45,79,161,.22); text-decoration:none;
    }
    .btn-new-folder:hover {
      background:var(--primary-dark); color:#fff; text-decoration:none;
      box-shadow:0 5px 16px rgba(45,79,161,.32); transform:translateY(-1px);
    }

    /* Recherche */
    .search-wrap { position:relative; margin-bottom:28px; }
    .search-wrap .s-icon {
      position:absolute; left:16px; top:50%; transform:translateY(-50%);
      color:var(--muted); font-size:18px; pointer-events:none;
    }
    .search-input {
      width:100%; max-width:540px; padding:11px 16px 11px 46px;
      border:1.5px solid #dce4f0; border-radius:5px; background:#fff;
      font-size:14px; color:#1a2540; font-family:'DM Sans',sans-serif;
      transition:border-color .2s, box-shadow .2s; outline:none;
      box-shadow:0 1px 4px rgba(0,0,0,.04);
    }
    .search-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(45,79,161,.12); }
    .search-input::placeholder { color:var(--muted); }

    /* Résultats de recherche */
    .result-item {
      display:flex; align-items:center; gap:10px; padding:10px 16px;
      color:#1a2540; font-size:13.5px; font-weight:500;
      border-bottom:1px solid #f0f3fa; text-decoration:none; cursor:pointer;
    }
    .result-item:last-child { border-bottom:none; }
    .result-item i { color:var(--muted); font-size:17px; flex-shrink:0; }
    .result-item .r-folder { font-size:11.5px; color:var(--muted); }
    .result-item:hover { background:#f4f7fb; }

    /* Grille */
    .folders-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap:16px;
    }

    /* Carte */
    .folder-card {
      background:#fff; border:1.5px solid var(--border); border-radius:16px;
      display:flex; flex-direction:column; overflow:hidden; position:relative;
      text-decoration:none; color:inherit;
      transition:border-color .2s, box-shadow .2s, transform .18s;
      animation:cardIn .3s ease both;
    }
    .folder-card:hover {
      border-color:var(--primary);
      box-shadow:0 8px 28px rgba(45,79,161,.13);
      transform:translateY(-3px);
      text-decoration:none; color:inherit;
    }

    /* Bandeau couleur */
    .card-stripe { height:5px; }

    /* Corpo de la carte */
    .card-body-inner {
      padding:18px 18px 14px; display:flex;
      align-items:flex-start; gap:14px; text-decoration:none; color:inherit; flex:1;
    }
    .card-body-inner:hover { text-decoration:none; color:inherit; }

    /* Icône */
    .folder-ico {
      width:46px; height:46px; min-width:46px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .folder-ico i { font-size:23px; }

    /* Texte */
    .folder-text { flex:1; min-width:0; }
    .f-name {
      font-size:14.5px; font-weight:700; color:#1a2540;
      margin-bottom:5px; line-height:1.3;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .f-desc {
      font-size:12.5px; color:var(--muted); line-height:1.45;
      display:-webkit-box; -webkit-line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }
    .f-desc.empty { font-style:italic; }

    /* Pied de carte */
    .card-foot {
      padding:8px 16px; border-top:1px solid #f0f3fa;
      display:flex; justify-content:flex-end;
    }
    .edit-btn {
      display:inline-flex; align-items:center; gap:4px;
      font-size:12px; color:var(--muted); background:none; border:none;
      padding:3px 9px; border-radius:7px; cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition:background .15s, color .15s;
    }
    .edit-btn:hover { background:#eef3fc; color:var(--primary); }
    .edit-btn i { font-size:14px; }

    /* Carte personnelle */
    .folder-card.personal .folder-ico { background:var(--primary); }
    .folder-card.personal .folder-ico i { color:#fff; }

</style>

<script>
$(document).ready(function() {
	loadContent();
});

var	currentFolder=0;

  // Thèmes icône/couleur par mot-clé dans le titre du classeur
  var THEMES = [
    { keys:['bureau','bur'],      icon:'mdi-briefcase-outline',       accent:'#e67e22' },
    { keys:['document'],          icon:'mdi-note-multiple-outline',   accent:'#e67e22' },
    { keys:['cours','formation','instruction','stage'], icon:'mdi-school',                  accent:'#27ae60' },
    { keys:['manuel'], icon:'mdi-note-outline',                  accent:'#27ae60' },
    { keys:['avion'],             icon:'mdi-airplane', 	   			  accent:'#2980b9' },
    { keys:['maintenance','mtn'], icon:'mdi-tools',                   accent:'#d35400' },
    { keys:['réservation','resa'],icon:'mdi-calendar-outline',        accent:'#16a085' },
    { keys:['list'],              icon:'mdi-format-list-bulleted-square',        accent:'#16a085' },
    { keys:['sécurité','rex'],    icon:'mdi-alert-outline',           accent:'#c0392b' },
    { keys:['test'],              icon:'mdi-test-tube-empty',         accent:'#7f8c8d' },
  ];

  function getTheme(title) {
    var t = title.toLowerCase();
    for (var i = 0; i < THEMES.length; i++)
      for (var j = 0; j < THEMES[i].keys.length; j++)
        if (t.indexOf(THEMES[i].keys[j]) !== -1) return THEMES[i];
    return { icon:'mdi-folder-outline', accent:'#2d4fa1' };
  }



function loadContent()
{
	$.get('/api/v1/docs/lstfolder').done(function(data)
	{
		divFolder=document.getElementById("lstfolders");
		divFolder.innerHTML="";

		var txt="";
	    var html = '';

		txt=txt+"<div class='grid-margin stretch-card'><div class='card'>";
		txt=txt+"<div class='card-header action'><a href='/docs/mydocs'>"+"Mes Documents"+"</a>";
		txt=txt+"</div><div class='card-body'>";
		txt=txt+"<p>Vous retrouverez ici la liste des documents de votre profile.</p>";
		txt=txt+"</div></div></div>";

		// Carte "Mes Documents" en tête
		html += '<a href="/docs/mydocs" class="folder-card personal">' +
		'<div class="card-stripe" style="background:var(--primary);"></div>' +
		'<div class="card-body-inner">' +
			'<div class="folder-ico" style="background:var(--primary);"><i class="mdi mdi-account-circle-outline" style="color:#fff;font-size:23px;"></i></div>' +
			'<div class="folder-text">' +
			'<div class="f-name">Mes Documents</div>' +
			'<div class="f-desc">Tous les documents liés à votre profil membre.</div>' +
			'</div>' +
		'</div>' +
		'<span class="personal-badge">Personnel</span>' +
		'</a>';

		// Cartes classeurs
		for (var k in data.data) {
			var f = data.data[k];
			var th = getTheme(f.title);
			var desc = (f.description && f.description.trim())
				? f.description.replace(/\n/g,'<br>')
				: '<span class="empty">Aucune description</span>';

			html += '<div class="folder-card">' +
				'<div class="card-stripe" style="background:' + th.accent + ';"></div>' +
				'<a href="/docs/folder?id=' + f.id + '" class="card-body-inner">' +
				'<div class="folder-ico" style="background:' + th.accent + '18;">' +
					'<i class="mdi ' + th.icon + '" style="color:' + th.accent + ';"></i>' +
				'</div>' +
				'<div class="folder-text">' +
					'<div class="f-name">' + f.title + '</div>' +
					'<div class="f-desc">' + desc + '</div>' +
				'</div>' +
				'</a>' +
				'<div class="card-foot">';
			if (f.edit==1)
			{
				html +='<button class="edit-btn" onclick="event.stopPropagation();editFolder(' + f.id + ');" title="Modifier">' +
					'<i class="mdi mdi-pencil-outline"></i> Modifier' +
				'</button>';

			}
				html +='</div>' +
				'</div>';
		}

	  	divFolder.innerHTML = html;

	});
}
function createFolder()
{
	console.log("Create Folder");
	$("#contentNewTitle").val("");
	$("#contentNewComment").val("");
	$("#group_read").val("");
	$("#group_write").val("");
	$("#createFolder").css({"display":"block"});
	$("#createFolder").css("opacity",1);
	$(".card").css("opacity",0.25);
	$(".sidebar").css("opacity",0.25);
	$(".content-menu").css("opacity",0.25);
	currentFolder=0;
}


function editFolder(id)
{
	console.log("Edit Folder "+id);

	$.get('/api/v1/docs/getfolder?id='+id).done(function(data)
	{
		console.log(data);
		$("#contentNewTitle").val(data.data.title);
		$("#contentNewComment").val(data.data.description);
		$("#group_read").val(data.data.group_read);
		$("#group_write").val(data.data.group_write);
		$("#createFolder").css({"display":"block"});
		$("#createFolder").css("opacity",1);
		$(".card").css("opacity",0.25);
		$(".sidebar").css("opacity",0.25);
		$(".content-menu").css("opacity",0.25);
		currentFolder=id;
	});
}

$( "#cancel" ).on( "click", function() {
	$("#createFolder").css({"display":"none"});
	$("#createFolder").css("opacity",0);
	$(".card").css("opacity",1);
	$(".sidebar").css("opacity",1);
	$(".content-menu").css("opacity",1);
});

$( "#save" ).on( "click", function() {
	$.post( "/api/v1/docs/postfolder", { id: currentFolder, title:$("#contentNewTitle").val(), description:$("#contentNewComment").val(), group_read:$("#group_read").val(), group_write:$("#group_write").val()} ).done(function(data) {
		console.log("Folder created");
		loadContent();
	});

	$("#createFolder").css({"display":"none"});
	$("#createFolder").css("opacity",0);
	$(".card").css("opacity",1);
	$(".sidebar").css("opacity",1);
	$(".content-menu").css("opacity",1);
});

$( "#close" ).on( "click", function() {
	$("#createFolder").css("opacity",0);
	$("#createFolder").css("display","none");
	$(".card").css("opacity",1);
	$(".sidebar").css("opacity",1);
	$(".content-menu").css("opacity",1);
});
	
function showSearch()
{
	$("#search").css({"display":"inline-block"});
	$("#lstPapers").html("");
	$("#crit").focus();

}

function searchApply()
{
	window.location.replace("/docs/folder?crit="+$("#crit").val());
}
function searchCancel()
{
	$("#crit").val("");
	$("#lstPapers").html("");
	$("#search").css({"display":"none"});
}

var timer=null;
var searchTxt="";
function searchkey(e) {
	text="";

	if (window.event)
	{
		key = window.event.keyCode;
	} //IE
	else
	{
		key = e.which;
	} //firefox

	if (key==13)
	{
		window.location.replace("/docs/folder?crit="+$("#crit").val());
		return false;
	}

	searchTxt=$("#crit").val();

	if (timer) {
		window.clearTimeout(timer);
	}
	timer = window.setTimeout( function() {
		timer = null;
		searchList();
	}, 300 );

	console.log(searchTxt);
}

function searchList()
{
	console.log("GET:"+searchTxt);

	var crit=$("#crit").val();

	if (crit!="")
	{
		var sort="dte_creat";
		var limit=20;
		$.get('/api/v1/docs/lstpaper?sort='+sort+'&crit='+crit+'&limit='+limit).done(function(data)
		{
			var txtFiles="";
			i=0
			for (var key in data.data)
			{
				for (var ii in data.data[key].doc)
				{
					txtFiles=txtFiles+"<div class='doc-list-item'>";
					txtFiles=txtFiles+data.data[key].doc[ii].fullpath;
					txtFiles=txtFiles+"</div>";
					i=i+1;
				}
			}
			$("#lstPapers").html(txtFiles);
			if (i>0)
			{
				$("#lstPapersOutbox").css("display","block");
			}
		});
	}
	else
	{
		$("#lstPapersOutbox").css("display","none");
		$("#lstPapers").html("");
	}
}

</script>

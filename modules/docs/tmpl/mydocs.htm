<style>
/* ── Styles locaux — page Documents ── */
.col-4 { max-width: unset; }

/* Barre de filtres */
.filters-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
}
.filter-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.filter-group label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--p67-text-muted);
  margin: 0;
}
.filter-group.filter-search { flex: 1; min-width: 180px; }
.filter-group.filter-search .input-wrap { position: relative; }
.filter-group.filter-search .input-wrap .mdi {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--p67-text-muted);
  font-size: 1rem;
  pointer-events: none;
}
.filter-group.filter-search input { padding-left: 32px; }

/* Zone d'upload */
.upload-zone {
  border: 2px dashed var(--p67-primary-border);
  background: var(--p67-primary-light);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  color: var(--p67-text-muted);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--p67-primary);
  background: #e4edfa;
  color: var(--p67-primary);
}
.upload-zone .mdi { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.upload-zone p  { margin: 0; font-size: 0.85rem; font-weight: 500; }
.upload-zone small { font-size: 0.75rem; }

/* Liste de documents */
.paper-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--p67-border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.paper-item:last-child { border-bottom: none; }
.paper-item:hover { background: var(--p67-primary-light); }

.paper-ico {
  width: 38px; height: 38px; min-width: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--p67-primary-light);
  border: 1px solid var(--p67-primary-border);
  flex-shrink: 0;
  margin-top: 2px;
  transition: background .15s;
}
.paper-ico .mdi { font-size: 1.2rem; color: var(--p67-primary); }
.paper-item:hover .paper-ico { background: var(--p67-primary); }
.paper-item:hover .paper-ico .mdi { color: #fff; }

.paper-content { flex: 1; min-width: 0; }

.paper-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--p67-text);
  margin-bottom: 3px;
  line-height: 1.3;
}

.paper-meta {
  font-size: 0.78rem;
  color: var(--p67-text-muted);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.paper-meta span { display: flex; align-items: center; gap: 4px; }
.paper-meta .mdi { font-size: 0.85rem; }

/* Pièces jointes en pills */
.paper-attachments { display: flex; flex-wrap: wrap; gap: 5px; }
.attach-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 9px;
  border: 1px solid var(--p67-border);
  background: #f7f9fc;
  color: var(--p67-text);
  font-size: 0.75rem;
  font-weight: 500;
  text-decoration: none;
  border-radius: 20px;
  transition: background .15s, border-color .15s, color .15s;
}
.attach-pill:hover {
  background: var(--p67-primary-light);
  border-color: var(--p67-primary);
  color: var(--p67-primary);
  text-decoration: none;
}
.attach-pill .mdi { font-size: 0.85rem; }

/* Boutons d'action (hover) */
.paper-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
  flex-shrink: 0;
  padding-top: 2px;
}
.paper-item:hover .paper-actions { opacity: 1; }

.action-btn {
  width: 30px; height: 30px;
  border: none;
  background: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--p67-text-muted);
  cursor: pointer;
  font-size: 0.95rem;
  border-radius: 4px;
  transition: background .15s, color .15s;
}
.action-btn:hover { background: var(--p67-primary-light); color: var(--p67-primary); }
.action-btn.danger:hover { background: var(--p67-danger-soft); color: var(--p67-danger); }

/* État vide */
.paper-empty {
  padding: 40px;
  text-align: center;
  color: var(--p67-text-muted);
}
.paper-empty .mdi { font-size: 2.5rem; display: block; margin-bottom: 10px; opacity: .4; }

/* Modal — ajustements */
.modal-header-actions { display: flex; align-items: center; gap: 6px; }
.modal-icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--p67-border);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--p67-text-muted);
  font-size: 1rem;
  border-radius: 4px;
  transition: background .15s, color .15s, border-color .15s;
}
.modal-icon-btn:hover { background: var(--p67-primary-light); color: var(--p67-primary); border-color: var(--p67-primary-border); }
.modal-icon-btn.danger:hover { background: var(--p67-danger-soft); color: var(--p67-danger); border-color: #f5b8b5; }

.modal-fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 20px;
}

.modal-upload-zone {
  border: 1.5px dashed var(--p67-primary-border);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--p67-primary-light);
  color: var(--p67-text-muted);
  font-size: 0.82rem;
}
.modal-upload-zone:hover { border-color: var(--p67-primary); color: var(--p67-primary); background: #e4edfa; }
.modal-upload-zone .mdi { font-size: 1.3rem; }

.modal-divider { height: 1px; background: var(--p67-border); margin: 16px 0; }

/* Commentaires dans modal */
.comment-block {
  background: var(--p67-primary-light);
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: 0.82rem;
  color: var(--p67-text);
  border-left: 3px solid var(--p67-primary);
}
.comment-block .c-meta { font-size: 0.72rem; color: var(--p67-text-muted); margin-top: 4px; }

/* Compteur de documents */
#paperCount {
  font-size: 0.75rem;
  color: var(--p67-text-muted);
  font-weight: 400;
  margin-left: auto;
}
</style>

  // ── Icône selon extension de fichier ──────────────────────────
  function fileIcon(filename) {
    if (!filename) return 'mdi-file-outline';
    var ext = filename.split('.').pop().toLowerCase();
    var map = {
      pdf:  'mdi-file-pdf-box',
      doc: 'mdi-file-word', docx: 'mdi-file-word',
      xls: 'mdi-file-excel', xlsx: 'mdi-file-excel',
      ppt: 'mdi-file-powerpoint', pptx: 'mdi-file-powerpoint',
      jpg: 'mdi-file-image', jpeg: 'mdi-file-image',
      png: 'mdi-file-image', gif: 'mdi-file-image',
      txt: 'mdi-file-document-outline',
      zip: 'mdi-folder-zip-outline', rar: 'mdi-folder-zip-outline',
    };
    return map[ext] || 'mdi-file-outline';
  }

  function fileColor(filename) {
    if (!filename) return 'var(--primary)';
    var ext = filename.split('.').pop().toLowerCase();
    if (['pdf'].includes(ext))           return '#c0392b';
    if (['doc','docx'].includes(ext))    return '#2980b9';
    if (['xls','xlsx'].includes(ext))    return '#27ae60';
    if (['ppt','pptx'].includes(ext))    return '#e67e22';
    if (['jpg','jpeg','png','gif'].includes(ext)) return '#8e44ad';
    if (['zip','rar'].includes(ext))     return '#7f8c8d';
    return 'var(--primary)';
  }

// Sending AJAX request and upload file
function uploadData(id,formdata)
{
	console.log("upload file");
	
    $.ajax({
        url: '/api/v1/docs/postdoc?id=0&folder=0&uid='+uid,
        type: 'post',
        data: formdata,
        contentType: false,
        processData: false,
        dataType: 'json',
        success: function(response){
			response.doc=[];
			response.doc[0]=[];
			response.doc[0].url=response.link;
			txt=generateLine(response.id,response.title,response.author,response.created,response.doc);

			$("#lstPapers").append(txt);
			listDocs[response.id]=response;
        },
		error: function(response){
			$("#newContentText").html("Nouveau Document");
			$("#addContentText").html("Ajouter Document");
        }
    });
}

	{

	txt=txt+'</div>';
	txt=txt+'</div>';

    var html = '';

<!-- BEGIN: corps -->
<style>
/* ── Styles locaux — page Documents ── */

/* Barre de filtres */
.filters-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
}
.filter-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.filter-group label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--p67-text-muted);
  margin: 0;
}
.filter-group.filter-search { flex: 1; min-width: 180px; }
.filter-group.filter-search .input-wrap { position: relative; }
.filter-group.filter-search .input-wrap .mdi {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--p67-text-muted);
  font-size: 1rem;
  pointer-events: none;
}
.filter-group.filter-search input { padding-left: 32px; }

/* Zone d'upload */
.upload-zone {
  border: 2px dashed var(--p67-primary-border);
  background: var(--p67-primary-light);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  color: var(--p67-text-muted);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--p67-primary);
  background: #e4edfa;
  color: var(--p67-primary);
}
.upload-zone .mdi { font-size: 1.8rem; display: block; margin-bottom: 4px; }
.upload-zone p  { margin: 0; font-size: 0.85rem; font-weight: 500; }
.upload-zone small { font-size: 0.75rem; }

/* Liste de documents */
.paper-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--p67-border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.paper-item:last-child { border-bottom: none; }
.paper-item:hover { background: var(--p67-primary-light); }

.paper-ico {
  width: 38px; height: 38px; min-width: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--p67-primary-light);
  border: 1px solid var(--p67-primary-border);
  flex-shrink: 0;
  margin-top: 2px;
  transition: background .15s;
}
.paper-ico .mdi { font-size: 1.2rem; color: var(--p67-primary); }
.paper-item:hover .paper-ico { background: var(--p67-primary); }
.paper-item:hover .paper-ico .mdi { color: #fff; }

.paper-content { flex: 1; min-width: 0; }

.paper-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--p67-text);
  margin-bottom: 3px;
  line-height: 1.3;
}

.paper-meta {
  font-size: 0.78rem;
  color: var(--p67-text-muted);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.paper-meta span { display: flex; align-items: center; gap: 4px; }
.paper-meta .mdi { font-size: 0.85rem; }

/* Pièces jointes en pills */
.paper-attachments { display: flex; flex-wrap: wrap; gap: 5px; }
.attach-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 9px;
  border: 1px solid var(--p67-border);
  background: #f7f9fc;
  color: var(--p67-text);
  font-size: 0.75rem;
  font-weight: 500;
  text-decoration: none;
  border-radius: 20px;
  transition: background .15s, border-color .15s, color .15s;
}
.attach-pill:hover {
  background: var(--p67-primary-light);
  border-color: var(--p67-primary);
  color: var(--p67-primary);
  text-decoration: none;
}
.attach-pill .mdi { font-size: 0.85rem; }

/* Boutons d'action (hover) */
.paper-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .15s;
  flex-shrink: 0;
  padding-top: 2px;
}
.paper-item:hover .paper-actions { opacity: 1; }

.action-btn {
  width: 30px; height: 30px;
  border: none;
  background: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--p67-text-muted);
  cursor: pointer;
  font-size: 0.95rem;
  border-radius: 4px;
  transition: background .15s, color .15s;
}
.action-btn:hover { background: var(--p67-primary-light); color: var(--p67-primary); }
.action-btn.danger:hover { background: var(--p67-danger-soft); color: var(--p67-danger); }

/* État vide */
.paper-empty {
  padding: 40px;
  text-align: center;
  color: var(--p67-text-muted);
}
.paper-empty .mdi { font-size: 2.5rem; display: block; margin-bottom: 10px; opacity: .4; }

/* Modal — ajustements */
.modal-header-actions { display: flex; align-items: center; gap: 6px; }
.modal-icon-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--p67-border);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--p67-text-muted);
  font-size: 1rem;
  border-radius: 4px;
  transition: background .15s, color .15s, border-color .15s;
}
.modal-icon-btn:hover { background: var(--p67-primary-light); color: var(--p67-primary); border-color: var(--p67-primary-border); }
.modal-icon-btn.danger:hover { background: var(--p67-danger-soft); color: var(--p67-danger); border-color: #f5b8b5; }

.modal-fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 20px;
}

.modal-upload-zone {
  border: 1.5px dashed var(--p67-primary-border);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--p67-primary-light);
  color: var(--p67-text-muted);
  font-size: 0.82rem;
}
.modal-upload-zone:hover { border-color: var(--p67-primary); color: var(--p67-primary); background: #e4edfa; }
.modal-upload-zone .mdi { font-size: 1.3rem; }

.modal-divider { height: 1px; background: var(--p67-border); margin: 16px 0; }

/* Commentaires dans modal */
.comment-block {
  background: var(--p67-primary-light);
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: 0.82rem;
  color: var(--p67-text);
  border-left: 3px solid var(--p67-primary);
}
.comment-block .c-meta { font-size: 0.72rem; color: var(--p67-text-muted); margin-top: 4px; }

/* Compteur de documents */
#paperCount {
  font-size: 0.75rem;
  color: var(--p67-text-muted);
  font-weight: 400;
  margin-left: auto;
}
</style>


<!-- ── Barre d'actions ── -->
<div class="row">
  <div class="col content-menu">
    <i class="mdi mdi-folder-multiple-outline"></i> <a href="/docs">Documents</a> / {folder_name}
  </div>
</div>

<!-- ── Card filtres + upload ── -->
<div class="row">
  <div class="col grid-margin stretch-card">
    <div class="card">
      <div class="card-header">
        Filtres &amp; Import
        <span id="paperCount"></span>
      </div>
      <div class="card-body">
        <div class="filters-bar">

          <div class="filter-group">
            <label>Afficher</label>
            <select id="selectFilter" class="form-control" style="min-width:160px;" onchange="loadPapers();">
              <option value="active" selected>Documents actifs</option>
              <option value="all">Tous</option>
            </select>
          </div>

          <div class="filter-group">
            <label>En date du</label>
            <input id="selectDate" class="form-control" type="date" value="" onchange="loadPapers();">
          </div>

          <div class="filter-group">
            <label>Trier par</label>
            <select id="selectSort" class="form-control" style="min-width:140px;" onchange="loadPapers();">
              <option value="dte_creat" selected>Date</option>
              <option value="title">Titre</option>
              <option value="uid_creat">Auteur</option>
            </select>
          </div>

          <div class="filter-group filter-search">
            <label>Rechercher</label>
            <div class="input-wrap">
              <i class="mdi mdi-magnify"></i>
              <input type="text" id="crit" class="form-control"
                placeholder="Mot-clé…"
                onkeyup="searchkey(event);" autocomplete="off">
            </div>
          </div>

        </div>
      </div>

		<!-- BEGIN: createdoc -->
		<!-- Zone d'upload -->
		<div style="padding: 0 1.25rem 1.25rem;">
			<div id="newContentFile" class="upload-zone">
			<label for="newFile" style="cursor:pointer; margin:0; width:100%; display:block;">
				<i class="mdi mdi-cloud-upload-outline"></i>
				<p>Déposer un fichier ici ou <strong>parcourir</strong></p>
				<small>Glissez-déposez ou cliquez pour ajouter un nouveau document</small>
			</label>
			<input id="newFile" type="file" style="display:none">
			<div style="text-align:center; font-size:0.82rem; color:var(--p67-text-muted); margin-top:6px; display:none;" id="newContentText"></div>
			</div>
		</div>
		<!-- END: createdoc -->

    	</div>
  	</div>
</div>

<!-- ── Card liste des documents ── -->
<div class="row">
  <div class="col grid-margin stretch-card">
    <div class="card">
      <div class="card-header">Documents</div>
      <div id="lstPapers">
        <!-- Chargé dynamiquement par loadPapers() -->
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════
     MODAL — Détail / édition document
     ══════════════════════════════════════ -->
<div id="paperContent" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:10px; flex:1; min-width:0;">
          <div class="paper-ico" style="flex-shrink:0;">
            <i class="mdi mdi-file-document-outline"></i>
          </div>
          <input type="text" id="contentTitle" class="form-control" readonly>
        </div>
        <div class="modal-header-actions" style="margin-left:10px;">
          <!-- BEGIN: edit -->
			    <button id="edit" type="button" class="modal-icon-btn" title="Modifier">
	            <i class="mdi mdi-pencil-outline"></i>
    	    </button>
          <button id="archive" type="button" class="modal-icon-btn danger" title="Archiver">
            <i class="mdi mdi-archive"></i>
          </button>
          <!-- END: edit -->
          <button id="close" type="button" class="modal-icon-btn" title="Fermer">
            <i class="mdi mdi-close"></i>
          </button>
          </div>
      </div>

      <div class="modal-body">

        <!-- Métadonnées 2 colonnes -->
        <div class="modal-fields-grid">
          <div class="form-group">
            <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Auteur</label>
            <input type="text" id="contentAuthor" class="form-control" readonly>
          </div>
          <div class="form-group">
            <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Date de création</label>
            <input type="text" id="contentDateCreate" class="form-control" readonly>
          </div>
          <div class="form-group">
            <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Date de début</label>
            <input type="date" id="contentDateStart" class="form-control" readonly>
          </div>
          <div class="form-group">
            <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Date d'échéance</label>
            <input type="date" id="contentDateEnd" class="form-control" readonly>
          </div>
        </div>

        <div class="modal-divider"></div>

		<!-- BEGIN: adddoc -->
        <!-- Pièces jointes -->
        <div class="form-group">
          <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Pièces jointes</label>
          <div id="addContentFile" class="modal-upload-zone">
            <label for="addFile" style="cursor:pointer; margin:0; display:inline-flex; align-items:center; gap:6px;">
              <i class="mdi mdi-cloud-upload-outline"></i>
              <span id="addContentText">Ajouter un fichier</span>
            </label>
            <input id="addFile" type="file" style="display:none">
          </div>
          <div id="modalAttachments" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:5px;"></div>
        </div>
        <div class="modal-divider"></div>
		<!-- END: adddoc -->

        <!-- Commentaires -->
        <div class="form-group">
          <label class="col-form-label" style="font-size:0.72rem; text-transform:uppercase; letter-spacing:.06em;">Ajouter un commentaire</label>
          <textarea id="contentNewComment" class="form-control" rows="2" placeholder="Votre commentaire…"></textarea>
        </div>

        <div id="contentComment" class="profile-feed"></div>


	  </div>

		<!-- Boutons -->
		<div class="card-footer">
			<input id="save" type="button" value="Enregistrer" class="btn btn-primary btn-sm">
			<input id="cancel" type="button" value="Annuler" class="btn btn-light btn-sm">
		</div>

    </div>
  </div>
</div>

<script>
  /* ═══════════════════════════════════════════════════
     LOGIQUE — identique à l'original, rendu amélioré
     ═══════════════════════════════════════════════════ */

  $(document).ready(function() { loadPapers(); });

  var currentPaper = 0;
  var isEditing = false;

// ── Chargement liste ──────────────────────────────────────────
  function loadPapers() {
    var filter = $('#selectFilter').val();
    var date   = $('#selectDate').val();
    var crit   = $('#crit').val();
    var sort   = $('#selectSort').val();

    $.get('/api/v1/docs/lstpaper?id={id}&filter='+filter+'&date='+date+'&sort='+sort+'&crit='+crit)
          .done(function(data){ renderPapers(data); 
    });
  }

  function renderPapers(data) {
    var html = '';
    var count = 0;

    for (var k in data.data) {
      var p = data.data[k];
      count++;

      // Attachements en pills
      var attachHtml = '';
      for (var d in p.doc) {
        attachHtml += '<a href="' + p.doc[d].url + '" target="_blank" class="attach-pill" onclick="event.stopPropagation();">' +
          '<i class="mdi mdi-file-' + p.doc[d].icon + '" style="color:' + p.doc[d].color + ';"></i>' + p.doc[d].name + '</a>';
      }

      var authorHtml = p.author ? '<span><i class="mdi mdi-account-outline"></i>' + p.author + '</span>' : '';

      html += '<div class="paper-item" id="paperItem_' + p.id + '" onclick="loadContent(' + p.id + ');" >' +
        '<div class="paper-ico"><i class="mdi mdi-file-document-outline"></i></div>' +
        '<div class="paper-content">' +
          '<div class="paper-title" id="paperTitle_' + p.id + '">' + p.title + '</div>' +
          '<div class="paper-meta">' +
            authorHtml +
            '<span><i class="mdi mdi-clock-outline"></i>' + p.created + '</span>' +
          '</div>';

      var dte_today = new Date();
      var dte_doc = new Date(p.dte_end); 

      if (dte_doc<dte_today)
      {
        html += '<span class="personal-badge">Périmé</span>';
      }

      html += (attachHtml ? '<div class="paper-attachments">' + attachHtml + '</div>' : '') +
        '</div>' +
        '<div class="paper-actions">' +
          '<button class="action-btn" onclick="event.stopPropagation();loadContent(' + p.id + ');" title="Voir / modifier"><i class="mdi mdi-pencil-outline"></i></button>' +
          '<button class="action-btn danger" onclick="event.stopPropagation();archivePaper(' + p.id + ');" title="Archiver"><i class="mdi mdi-archive-outline"></i></button>' +
        '</div>' +
      '</div>';
    }

    if (count === 0) {
      html = '<div style="padding:40px; text-align:center; color:var(--muted);">' +
        '<i class="mdi mdi-file-search-outline" style="font-size:40px; display:block; margin-bottom:10px;"></i>' +
        'Aucun document trouvé.</div>';
    }
    $('#lstPapers').html(html);
    $('#paperCount').text(count + ' document' + (count > 1 ? 's' : ''));
  }

  // ── Ouverture modal ───────────────────────────────────────────
  function loadContent(id) {
    currentPaper = id;
    isEditing = false;

    $.get('/api/v1/docs/getpaper?id=' + id).done(function(data) {
      $('#contentTitle').val(data.data.title);
      $('#contentAuthor').val(data.data.author);
      $('#contentDateCreate').val(data.data.created);
      $('#contentDateStart').val(data.data.dte_start);
      $('#contentDateEnd').val(data.data.dte_end);
      $('#contentNewComment').val('');
      setReadonly(true);

      // Pièces jointes dans la modal
      var attHtml = '';
      if (data.data.doc) {
        for (var d in data.data.doc) {
          var tmp = $('<div>').html(data.data.doc[d].url);
          var a = tmp.find('a');
          var fname = a.attr('title') || a.text().trim();
          var href  = a.attr('href') || '#';
          var ico   = fileIcon(fname);
          var col   = fileColor(fname);
          attHtml += '<a href="' + href + '" target="_blank" class="attach-pill">' +
            '<i class="mdi ' + ico + '" style="color:' + col + ';"></i>' + fname + '</a>';
        }
      }
      $('#modalAttachments').html(attHtml);

	$("#contentComment").html("");
	$.get('/api/v1/docs/lstcomment?id='+id).done(function(data)
	{
    for (var key in data.data)
		{
		//	showComment(data.data[key].avatar,data.data[key].description,data.data[key].author,data.data[key].created);
			var newComment='<div class="feed-item"><div class="feed-avatar"><img src="/'+data.data[key].avatar+'" alt="avatar"></div>';
			newComment+='<div class="feed-body"><div class="feed-title"><div class="feed-meta">'+data.data[key].author+'<span class="sep">·</span><i class="mdi mdi-clock-outline" style="font-size:.8rem;"></i>'+data.data[key].created+'</div></div>';
			newComment+='<p class="feed-text">'+data.data[key].description+'</p></div>';
			$("#contentComment").html($("#contentComment").html()+newComment);

		}
	});

      $('#paperContent').modal('show');
    });
  }

  function setReadonly(on) {
    ['#contentTitle','#contentDateStart','#contentDateEnd'].forEach(function(sel) {
      $(sel).prop('readonly', on);
      if (on) $(sel).removeClass('contentEditable');
      else    $(sel).addClass('contentEditable');
    });
  }

  // ── Boutons modal ─────────────────────────────────────────────
  $('#edit').on('click', function() {
    isEditing = !isEditing;
    setReadonly(!isEditing);
    $(this).find('i').toggleClass('mdi-pencil-outline mdi-pencil');
    $(this).toggleClass('active').css('background', isEditing ? '#eef3fc' : '').css('color', isEditing ? 'var(--primary)' : '');
  });

  $('#archive').on('click', function() {
    if (confirm('Archiver ce document ?')) archivePaper(currentPaper);
  });

  function archivePaper(id) {
    var today = new Date();
    var dateStr = today.getFullYear() + '-' + (today.getMonth()+1) + '-' + today.getDate();
    $.post('/api/v1/docs/postpaper', { id: id, dte_end: dateStr }).done(function() {
      $('#paperContent').modal('hide');
      loadPapers();
    });
  }

  $('#save').on('click', function() {

	if (isEditing)
	{
		$.post('/api/v1/docs/postpaper', {
			id: currentPaper,
			title: $('#contentTitle').val(),
			dte_start: $('#contentDateStart').val(),
			dte_end: $('#contentDateEnd').val()
		}).done(function() {
			$('#paperTitle_' + currentPaper).text($('#contentTitle').val());
		});
	}
	if ($("#contentNewComment").val()!="")
	{
		$.post( "/api/v1/docs/postcomment", { id: currentPaper, comment:$("#contentNewComment").val() } ).done(function(data) {
			console.log("Comment saved");
			$("#contentComment").html($("#contentComment").html()+$("#contentNewComment").val());
			//showComment(data.avatar,data.description,data.author,data.created);
		});
	}

    $('#paperContent').modal('hide');
  });

  $('#cancel, #close').on('click', function() { $('#paperContent').modal('hide'); });

  // ── Recherche ─────────────────────────────────────────────────
  var timer = null;
  function searchkey(e) {
    var key = e.which || (window.event && window.event.keyCode);
    if (key === 13) { loadPapers(); return false; }
    if (timer) clearTimeout(timer);
    timer = setTimeout(function() { timer = null; loadPapers(); }, 350);
  }

  // ── Upload drag & drop ────────────────────────────────────────
  $('html').on('dragover drop', function(e) { e.preventDefault(); e.stopPropagation(); });

  $('#newContentFile')
    .on('dragenter dragover', function() { $(this).addClass('drag-over'); })
    .on('dragleave',          function() { $(this).removeClass('drag-over'); })
    .on('drop', function(e) {
      $(this).removeClass('drag-over');
      e.stopPropagation(); e.preventDefault();
      var fd = new FormData();
      fd.append('file', e.originalEvent.dataTransfer.files[0]);
      uploadData(0, fd);
    });

  $('#newFile').on('change', function() {
    var fd = new FormData();
    fd.append('file', this.files[0]);
    uploadData(0, fd);
  });

  $('#addContentFile').on('drop', function(e) {
    e.stopPropagation(); e.preventDefault();
    var fd = new FormData();
    fd.append('file', e.originalEvent.dataTransfer.files[0]);
    uploadData(currentPaper, fd);
  });

  $('#addFile').on('change', function() {
    var fd = new FormData();
    fd.append('file', this.files[0]);
    uploadData(currentPaper, fd);
  });


  function uploadData(id, fd) {
	folder={id};
	if (folder==0)
	{
		return;
	}

	$.ajax({
      url: '/api/v1/docs/postdoc?id='+id+'&folder='+folder,
      type: 'POST',
      data: fd,
      processData: false,
      contentType: false,
      success: function(response) {
        if (id === 0) {
          // Nouveau document : ajout en tête de liste
          var ico = fileIcon(response.title);
          var col = fileColor(response.title);
          var html = '<div class="paper-item" id="paperItem_' + response.id + '" onclick="loadContent(' + response.id + ');">' +
            '<div class="paper-ico"><i class="mdi mdi-file-document-outline"></i></div>' +
            '<div class="paper-content">' +
              '<div class="paper-title" id="paperTitle_' + response.id + '">' + response.title + '</div>' +
              '<div class="paper-meta"><span><i class="mdi mdi-clock-outline"></i>' + response.created + '</span></div>' +
              '<div class="paper-attachments">' +
                '<a href="' + response.href + '" target="_blank" class="attach-pill" onclick="event.stopPropagation();">' +
                  '<i class="mdi ' + ico + '" style="color:' + col + ';"></i>' + response.title + '</a>' +
              '</div>' +
            '</div>' +
            '<div class="paper-actions">' +
              '<button class="action-btn" onclick="event.stopPropagation();loadContent(' + response.id + ');"><i class="mdi mdi-pencil-outline"></i></button>' +
              '<button class="action-btn danger" onclick="event.stopPropagation();archivePaper(' + response.id + ');"><i class="mdi mdi-archive-outline"></i></button>' +
            '</div>' +
          '</div>';
          $('#lstPapers').prepend(html);
        } else {
          // Ajout de pièce jointe à un doc existant
          var ico2 = fileIcon(response.title);
          var col2 = fileColor(response.title);
          $('#paperDocument_' + id).append(
            '<a href="' + response.href + '" target="_blank" class="attach-pill" onclick="event.stopPropagation();">' +
              '<i class="mdi ' + ico2 + '" style="color:' + col2 + ';"></i>' + response.title + '</a>');
        }
      }
    });
  }
  </script>
